// ── Firestore記録管理 ──
let cachedRecords=null;
async function getRecords(){
  const u=auth.currentUser;if(!u)return[];
  if(cachedRecords)return cachedRecords;
  try{
    const snap=await db.collection('users').doc(u.uid).collection('records').orderBy('time','desc').get();
    cachedRecords=snap.docs.map(d=>d.data());
    return cachedRecords;
  }catch(e){console.error(e);return[]}
}
async function saveRecord(rec){
  const u=auth.currentUser;if(!u)return;
  try{
    await db.collection('users').doc(u.uid).collection('records').add(rec);
    cachedRecords=null;
  }catch(e){console.error(e)}
}
async function getStreak(){
  const r=await getRecords();if(!r.length)return 0;
  const dates=[...new Set(r.map(x=>x.date))].sort().reverse();
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-864e5).toISOString().slice(0,10);
  if(dates[0]!==today&&dates[0]!==yesterday)return 0;
  let streak=1;
  for(let i=0;i<dates.length-1;i++){
    const d1=new Date(dates[i]),d2=new Date(dates[i+1]);
    if((d1-d2)/(864e5)===1)streak++;else break;
  }
  return streak;
}
async function getTodayCount(){const today=new Date().toISOString().slice(0,10);return(await getRecords()).filter(r=>r.date===today).length}
async function getTotalQuizzes(){return(await getRecords()).length}
async function getBestScore(){const r=await getRecords();return r.length?Math.max(...r.map(x=>x.score)):0}
async function clearRecords(){
  const u=auth.currentUser;if(!u)return;
  const snap=await db.collection('users').doc(u.uid).collection('records').get();
  const batch=db.batch();snap.docs.forEach(d=>batch.delete(d.ref));
  await batch.commit();cachedRecords=null;
}

// ── State ──
let state={phase:'start',level:null,questions:[],qi:0,selected:null,score:0,streak:0,showExample:false,history:[],mistakes:[],authMode:'login',authError:'',authLoading:false,userName:'',quizMode:'meaning'};
// quizMode: 'meaning' = 日本語→英語, 'listening' = 英語音声→日本語

function startQuiz(words,levelKey){
  const mode=state.quizMode;
  const pool=shuffle(words).slice(0,10);
  const allPool=levelKey?LEVELS[levelKey].words:ALL_WORDS;
  const qs=pool.map(w=>{
    const others=shuffle(allPool.filter(x=>x.word!==w.word)).slice(0,3);
    if(mode==='listening'){
      const options=shuffle([w,...others]);
      return{...w,options,correctIndex:options.findIndex(o=>o.word===w.word)};
    }else{
      const options=shuffle([w,...others]);
      return{...w,options,correctIndex:options.findIndex(o=>o.word===w.word)};
    }
  });
  state={...state,phase:'quiz',level:levelKey,qi:0,selected:null,score:0,streak:0,showExample:false,history:[],mistakes:[],questions:qs};
  render();
  if(mode==='listening')setTimeout(()=>speak(qs[0].word,.75),400);
}

function handleSelect(idx){
  if(state.selected!==null)return;
  state.selected=idx;
  const q=state.questions[state.qi];
  const correct=idx===q.correctIndex;
  state.streak=correct?state.streak+1:0;
  if(correct){state.score++;speak(q.word)}
  if(!correct)state.mistakes.push(q);
  state.history.push({...q,userAnswer:idx,correct});
  render();
}

async function nextQuestion(){
  state.selected=null;state.showExample=false;
  if(state.qi+1>=state.questions.length){
    state.phase='result';
    const lvl=state.level?LEVELS[state.level]:null;
    await saveRecord({date:new Date().toISOString().slice(0,10),level:lvl?.label||'MIX',score:state.score,total:state.questions.length,time:Date.now()});
  }
  else state.qi++;
  render();
  if(state.phase==='quiz'&&state.quizMode==='listening')setTimeout(()=>speak(state.questions[state.qi].word,.75),400);
}

// ── Auth ──
async function doSignup(){
  const name=$('auth-name')?.value.trim();
  const email=$('auth-email')?.value.trim();
  const pass=$('auth-pass')?.value;
  if(!name){state.authError='名前を入力してください';render();return}
  if(!email||!email.includes('@')){state.authError='メールアドレスを正しく入力してください';render();return}
  if(!pass||pass.length<6){state.authError='パスワードは6文字以上にしてください';render();return}
  state.authLoading=true;state.authError='';render();
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    await db.collection('users').doc(cred.user.uid).set({name,email,created:Date.now()});
    state.userName=name;state.phase='start';cachedRecords=null;
  }catch(e){
    state.authError=e.code==='auth/email-already-in-use'?'このメールアドレスは既に登録されています':e.code==='auth/weak-password'?'パスワードが弱すぎます（6文字以上）':e.code==='auth/invalid-email'?'メールアドレスの形式が正しくありません':'登録に失敗しました: '+e.message;
  }
  state.authLoading=false;render();
}
async function doLogin(){
  const email=$('auth-email')?.value.trim();
  const pass=$('auth-pass')?.value;
  if(!email||!email.includes('@')){state.authError='メールアドレスを正しく入力してください';render();return}
  if(!pass){state.authError='パスワードを入力してください';render();return}
  state.authLoading=true;state.authError='';render();
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pass);
    state.userName=cred.user.displayName||'';state.phase='start';cachedRecords=null;
  }catch(e){
    state.authError=e.code==='auth/user-not-found'?'このメールアドレスは登録されていません':e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'?'パスワードが間違っています':'ログインに失敗しました: '+e.message;
  }
  state.authLoading=false;render();
}
async function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  await auth.signOut();cachedRecords=null;state.phase='login';render();
}

function render(){
  const app=$('app');
  const u=auth.currentUser;
  if(!u){renderAuth(app);return}
  if(state.phase==='start')renderStart(app);
  else if(state.phase==='quiz')renderQuiz(app);
  else if(state.phase==='result')renderResult(app);
  else if(state.phase==='stats')renderStats(app);
  else renderStart(app);
}

function renderQuiz(app){
  const q=state.questions[state.qi];
  const lvl=state.level?LEVELS[state.level]:null;

  const isCorrect=ans!==null&&ans===q.correctIndex;
  const streakMsg=state.streak===3?REACTIONS.streak[0]:state.streak===5?REACTIONS.streak[1]:state.streak>=10?REACTIONS.streak[2]:null;

  let h='<div class="wrap">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-top:12px">';
  h+='<div style="display:flex;align-items:center;gap:10px">';
  h+='<button onclick="state.phase=\'start\';render()" style="background:rgba(255,255,255,.06);border:none;border-radius:8px;color:#888;padding:6px 10px;cursor:pointer;font-size:14px">←</button>';
  h+=`<span style="font-size:12px;padding:3px 10px;border-radius:8px;background:${lvl?ac+'22':'rgba(255,255,255,.06)'};color:${lvl?ac:'#aaa'};font-weight:700">${lvl?lvl.emoji+' '+lvl.label:'🎲 MIX'}</span>`;
  h+=`<span style="font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.06);color:#888">${state.quizMode==='listening'?'👂リスニング':'🇯🇵意味'}</span></div>`;
  h+='<div style="display:flex;gap:10px;align-items:center">';
  h+=`<span style="font-size:13px;color:#6666aa"><strong style="color:#a78bfa;font-size:18px">${state.qi+1}</strong>/${state.questions.length}</span>`;
  if(state.streak>0)h+=`<span style="font-size:13px;color:#fbbf24;font-weight:600">🔥${state.streak}</span>`;
  h+=`<span style="font-size:14px;color:#64c8ff;font-weight:700">${state.score}点</span></div></div>`;
  h+=`<div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:28px;overflow:hidden"><div style="height:100%;width:${(state.qi/state.questions.length)*100}%;background:linear-gradient(90deg,${ac},${ac}88);border-radius:2px;transition:width .4s"></div></div>`;
  h+='<div style="animation:slideUp .4s ease">';
  const isListening=state.quizMode==='listening';
  if(isListening){
    // Listening mode: show speaker button
    const we=q.word.replace(/'/g,"\\'");
    h+='<div style="display:flex;gap:12px;margin-bottom:24px;align-items:flex-start">';
    h+=`<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,${ac},${ac}88);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">👂</div>`;
    h+='<div style="background:rgba(255,255,255,.06);border-radius:4px 18px 18px 18px;padding:14px 18px;flex:1;border:1px solid rgba(255,255,255,.06)">';
    h+='<p style="margin:0 0 12px;font-size:13px;color:#8888bb">聴こえた単語の意味は？</p>';
    h+=`<button onclick="speak('${we}',.75)" style="padding:12px 24px;font-size:20px;border:2px solid rgba(99,102,241,.3);border-radius:14px;background:rgba(99,102,241,.1);cursor:pointer;transition:all .2s;color:#a78bfa;font-weight:700">🔊 もう一度聴く</button>`;
    h+='</div></div>';
  }else{
    // Normal mode: show Japanese meaning
    h+='<div style="display:flex;gap:12px;margin-bottom:24px;align-items:flex-start">';
    h+=`<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,${ac},${ac}88);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🎓</div>`;
    h+='<div style="background:rgba(255,255,255,.06);border-radius:4px 18px 18px 18px;padding:14px 18px;flex:1;border:1px solid rgba(255,255,255,.06)">';
    h+='<p style="margin:0 0 10px;font-size:13px;color:#8888bb">この意味の英単語は？</p>';
    h+=`<p style="margin:0;font-size:24px;font-weight:800;line-height:1.3">${q.meaning}</p></div></div>`;
  }
  h+='<div style="display:flex;flex-direction:column;gap:10px">';
  q.options.forEach((opt,i)=>{
    const isThis=ans===i,isAns=i===q.correctIndex;
    let bg='rgba(255,255,255,.04)',bd='rgba(255,255,255,.08)',am='';
    if(ans!==null&&isAns){bg='rgba(52,211,153,.15)';bd='#34d399'}
    if(ans!==null&&isThis&&!isAns){bg='rgba(248,113,113,.15)';bd='#f87171';am='animation:shake .4s ease;'}
    const circBg=ans!==null&&isAns?'rgba(52,211,153,.3)':ans!==null&&isThis?'rgba(248,113,113,.3)':'rgba(255,255,255,.06)';
    const circCol=ans!==null&&isAns?'#34d399':ans!==null&&isThis?'#f87171':'#8888aa';
    const label=ans!==null?(isAns?'✓':isThis?'✗':String.fromCharCode(65+i)):String.fromCharCode(65+i);
    const optLabel=isListening?opt.meaning:opt.word;
    h+=`<button class="ob ${ans!==null?'ad':''}" onclick="handleSelect(${i})" style="background:${bg};border-color:${bd};${am}">`;
    h+=`<span style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:${circBg};color:${circCol}">${label}</span>`;
    h+=`<span>${optLabel}</span>`;
    if(ans!==null&&isAns)h+=`<span class="sb" onclick="event.stopPropagation();speak('${opt.word}')" style="margin-left:auto;font-size:18px">🔊</span>`;
    h+='</button>';
  });
  h+='</div>';
  if(ans!==null){
    h+='<div style="animation:pop .3s ease;margin-top:18px">';
    h+='<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:14px">';
    h+=`<div style="width:42px;height:42px;border-radius:50%;background:${isCorrect?'linear-gradient(135deg,#34d399,#22d3ee)':'linear-gradient(135deg,#f97316,#f87171)'};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${isCorrect?'😄':'🤔'}</div>`;
    h+='<div style="background:rgba(255,255,255,.06);border-radius:4px 18px 18px 18px;padding:12px 16px;flex:1;border:1px solid rgba(255,255,255,.06)">';
    h+=`<p style="margin:0;font-size:15px;font-weight:700">${isCorrect?(streakMsg||pick(REACTIONS.correct)):pick(REACTIONS.wrong)}</p>`;
    if(!isCorrect)h+=`<p style="margin:4px 0 0;font-size:13px;color:#aaa">正解は <strong style="color:#34d399">${q.word}</strong>（${q.meaning}）だよ！</p>`;
    h+='</div></div>';
    const we=q.word.replace(/'/g,"\\'");
    h+=`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:10px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid rgba(255,255,255,.06)">`;
    h+=`<span class="sb" onclick="speak('${we}')" style="font-size:26px">🔊</span>`;
    h+=`<span style="font-size:18px;font-weight:700">${q.word}</span>`;
    h+=`<span style="font-size:13px;color:#8888aa">${q.phonetic}</span></div>`;
    const ee=q.example.replace(/'/g,"\\'");
    if(!state.showExample){
      h+=`<button onclick="state.showExample=true;render();setTimeout(()=>speak('${ee}',.8),300)" style="width:100%;padding:11px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:12px;color:#a78bfa;font-size:14px;font-weight:600;cursor:pointer">📖 例文を見る &amp; 聴く</button>`;
    }else{
      h+='<div style="padding:14px;background:rgba(99,102,241,.08);border-radius:12px;border:1px solid rgba(99,102,241,.2);animation:pop .3s ease">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">';
      h+=`<p style="margin:0 0 4px;font-size:14px;font-weight:600;line-height:1.5;flex:1">"${q.example}"</p>`;
      h+=`<span class="sb" onclick="speak('${ee}',.8)" style="font-size:20px;flex-shrink:0">🔊</span></div>`;
      h+=`<p style="margin:0;font-size:12px;color:#8888aa;line-height:1.5">${q.exampleJa}</p></div>`;
    }
    h+=`<button onclick="nextQuestion()" style="width:100%;margin-top:14px;padding:13px;font-size:15px;font-weight:700;border:none;border-radius:14px;cursor:pointer;color:#fff;background:linear-gradient(135deg,${ac},${ac}bb);box-shadow:0 4px 20px ${ac}44">${state.qi+1>=state.questions.length?'結果を見る 🏆':'次へ →'}</button>`;
    h+='</div>';
  }
  h+='</div></div>';
  app.innerHTML=h;
}

async function renderResult(app){
  const lvl=state.level?LEVELS[state.level]:null;
  const ac=lvl?.color||'#6366f1';
  const dayStreak=await getStreak();

  let h='<div class="wrap" style="animation:slideUp .5s ease">';
  h+='<div style="text-align:center;margin-bottom:24px;padding-top:24px">';
  h+=`<div style="font-size:64px;margin-bottom:8px;animation:pop .5s ease">${state.score>=9?'🏆':state.score>=7?'🎉':state.score>=5?'👍':'💪'}</div>`;
  if(lvl)h+=`<span style="font-size:12px;padding:3px 12px;border-radius:8px;background:${lvl.color}22;color:${lvl.color};font-weight:700">${lvl.emoji} ${lvl.label}</span>`;
  h+=`<h2 style="font-size:26px;font-weight:800;margin:10px 0 8px">${state.score>=9?'すばらしい！':state.score>=7?'いい感じ！':state.score>=5?'まずまず！':'伸びしろたっぷり！'}</h2>`;
  h+=`<div style="display:inline-flex;align-items:baseline;gap:4px;background:rgba(99,102,241,.15);padding:10px 24px;border-radius:14px">`;
  h+=`<span style="font-size:42px;font-weight:800;color:${ac}">${state.score}</span>`;
  h+=`<span style="font-size:18px;color:#6666aa">/ ${state.questions.length}</span></div></div>`;

  if(dayStreak>0){
    h+='<div class="streak-banner">';
    h+=`<div style="font-size:15px;color:#fbbf24;font-weight:800;margin-bottom:6px">🔥 ${dayStreak}日連続！</div>`;
    h+=`<div style="font-size:13px;color:#ddd;line-height:1.5">${getStreakMsg(dayStreak)}</div>`;
    h+='</div>';
  }

  h+='<h3 style="font-size:14px;color:#8888aa;margin-bottom:10px;font-weight:600">📋 回答一覧</h3>';
  h+='<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:24px">';
  state.history.forEach(item=>{
    const we=item.word.replace(/'/g,"\\'");
    h+=`<div class="history-row" style="border-color:${item.correct?'rgba(52,211,153,.2)':'rgba(248,113,113,.2)'}">`;
    h+=`<span style="font-size:16px">${item.correct?'✅':'❌'}</span>`;
    h+=`<div style="flex:1;min-width:0"><span style="font-weight:700;font-size:14px">${item.word}</span><span style="font-size:12px;color:#8888aa;margin-left:6px">${item.meaning}</span></div>`;
    h+=`<span class="sb" onclick="speak('${we}')" style="font-size:16px">🔊</span></div>`;
  });
  h+='</div><div style="display:flex;flex-direction:column;gap:10px">';
  if(state.mistakes.length>0){
    h+=`<button onclick="retryMistakes()" style="padding:13px;font-size:14px;font-weight:700;border:2px solid rgba(248,113,113,.3);border-radius:14px;background:rgba(248,113,113,.08);color:#f87171;cursor:pointer">🔄 間違えた${state.mistakes.length}問を復習</button>`;
  }
  h+=`<button onclick="startQuiz(${state.level?"LEVELS['"+state.level+"'].words":'ALL_WORDS'},${state.level?"'"+state.level+"'":'null'})" style="padding:13px;font-size:14px;font-weight:700;border:none;border-radius:14px;background:linear-gradient(135deg,${ac},${ac}bb);color:#fff;cursor:pointer;box-shadow:0 4px 20px ${ac}33">🎯 同じレベルでもう一回！</button>`;
  h+='<button onclick="state.phase=\'start\';render()" style="padding:11px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:transparent;color:#8888aa;cursor:pointer">レベル選択に戻る</button>';
  h+='</div></div>';
  app.innerHTML=h;
}

async function renderStatsAsync(){
  const app=$('app');
  app.innerHTML='<div class="wrap" style="text-align:center;padding-top:30vh"><div class="spinner"></div></div>';
  const records=(await getRecords()).slice();
  const dayStreak=await getStreak();
  const totalQ=records.length;
  const avgScore=totalQ?Math.round(records.reduce((s,r)=>s+r.score,0)/totalQ*10)/10:0;
  const byDate={};
  records.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r)});

  let h='<div class="wrap" style="animation:slideUp .5s ease">';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-top:12px">';
  h+='<button onclick="state.phase=\'start\';render()" style="background:rgba(255,255,255,.06);border:none;border-radius:8px;color:#888;padding:6px 10px;cursor:pointer;font-size:14px">←</button>';
  h+='<h2 style="font-size:20px;font-weight:800">📊 学習記録</h2></div>';

  h+='<div style="display:flex;gap:8px;margin-bottom:24px">';
  h+=`<div class="stat-card"><div style="font-size:24px;font-weight:800;color:#fbbf24">${dayStreak}</div><div style="font-size:11px;color:#8888aa;margin-top:2px">連続日数</div></div>`;
  h+=`<div class="stat-card"><div style="font-size:24px;font-weight:800;color:#a78bfa">${totalQ}</div><div style="font-size:11px;color:#8888aa;margin-top:2px">累計回数</div></div>`;
  h+=`<div class="stat-card"><div style="font-size:24px;font-weight:800;color:#34d399">${avgScore}</div><div style="font-size:11px;color:#8888aa;margin-top:2px">平均点</div></div>`;
  h+='</div>';
  if(dayStreak>0){
    h+='<div class="streak-banner" style="margin-bottom:24px">';
    h+=`<div style="font-size:13px;color:#ddd;line-height:1.5">${getStreakMsg(dayStreak)}</div></div>`;
  }
  for(const[date,recs]of Object.entries(byDate)){
    const d=new Date(date);
    const dateStr=`${d.getMonth()+1}/${d.getDate()}（${'日月火水木金土'[d.getDay()]}）`;
    h+=`<div style="margin-bottom:16px"><div style="font-size:13px;color:#8888aa;font-weight:600;margin-bottom:8px">${dateStr}</div>`;
    recs.forEach(r=>{
      const pct=r.score/r.total*100;
      const col=pct>=90?'#34d399':pct>=70?'#64c8ff':pct>=50?'#fbbf24':'#f87171';
      h+=`<div class="history-row" style="margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:${col};min-width:40px">${r.score}/${r.total}</span>`;
      h+=`<div style="flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col};border-radius:3px"></div></div>`;
      h+=`<span style="font-size:12px;color:#8888aa;min-width:50px;text-align:right">${r.level}</span></div>`;
    });
    h+='</div>';
  }
  if(!totalQ)h+='<p style="text-align:center;color:#666;padding:40px 0">まだ記録がありません。クイズをやってみよう！</p>';
  h+='<button onclick="if(confirm(\'本当に全記録を削除しますか？\')){clearRecords().then(()=>{state.phase=\'start\';render()})}" style="width:100%;margin-top:16px;padding:10px;font-size:12px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:transparent;color:#555;cursor:pointer">記録をリセット</button>';
  h+='</div>';
  app.innerHTML=h;
}

function retryMistakes(){
  const m=state.mistakes;
  const lvl=state.level?LEVELS[state.level]:null;
  const pool=lvl?.words||ALL_WORDS;
  const extra=m.length<4?shuffle(pool.filter(w=>!m.find(x=>x.word===w.word))).slice(0,4-m.length):[];
  startQuiz([...m,...extra],state.level);
}

// ── Auth状態監視 ──
auth.onAuthStateChanged(u=>{
  if(u){state.userName=u.displayName||'';state.phase='start'}
  else{state.phase='login'}
  render();
});
</script>
</body>
